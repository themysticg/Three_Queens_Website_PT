name: Deploy to dedicated server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
        working-directory: 'D:\Github_Repos\Three_Queens_Website_PT'
    steps:
      - name: Pull latest main
        run: |
          git fetch --all --prune
          git reset --hard origin/main

      - name: Install dependencies
        run: npm ci

      - name: Apply DB migrations (if any)
        run: npm run db:migrate:deploy

      - name: Build
        run: npm run build

      - name: Restart app via PM2
        run: pm2 restart three-queens --update-env
